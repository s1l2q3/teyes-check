name: Uptime Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-eu:
    name: Check from EU
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check site
        run: |
          URL="https://solanteq.com"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$URL" || echo "000")
          RESPONSE_TIME=$(curl -o /dev/null -s -w "%{time_total}" --max-time 10 "$URL" || echo "0")
          if [ "$HTTP_CODE" = "200" ]; then STATUS="ok"; else STATUS="fail"; fi

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          for i in 1 2 3 4 5; do
            git pull origin main
            echo "{\"time\":\"$TIMESTAMP\",\"status\":\"$STATUS\",\"http_code\":\"$HTTP_CODE\",\"response_time\":$RESPONSE_TIME}" \
              >> metrics-eu.jsonl
            git add metrics-eu.jsonl
            git commit -m "metrics-eu $TIMESTAMP" || true
            git push && break
            echo "Push failed, retry $i..."
            git checkout metrics-eu.jsonl
            sleep $((RANDOM % 5 + 2))
          done

  check-us:
    name: Check from US
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check site
        run: |
          URL="https://solanteq.com"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$URL" || echo "000")
          RESPONSE_TIME=$(curl -o /dev/null -s -w "%{time_total}" --max-time 10 "$URL" || echo "0")
          if [ "$HTTP_CODE" = "200" ]; then STATUS="ok"; else STATUS="fail"; fi

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          for i in 1 2 3 4 5; do
            git pull origin main
            echo "{\"time\":\"$TIMESTAMP\",\"status\":\"$STATUS\",\"http_code\":\"$HTTP_CODE\",\"response_time\":$RESPONSE_TIME}" \
              >> metrics-us.jsonl
            git add metrics-us.jsonl
            git commit -m "metrics-us $TIMESTAMP" || true
            git push && break
            echo "Push failed, retry $i..."
            git checkout metrics-us.jsonl
            sleep $((RANDOM % 5 + 2))
          done

  check-win:
    name: Check from Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check and commit
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          $url = "https://solanteq.com"
          $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          try {
            $sw = [System.Diagnostics.Stopwatch]::StartNew()
            $resp = Invoke-WebRequest -Uri $url -TimeoutSec 10 -UseBasicParsing
            $sw.Stop()
            $code = $resp.StatusCode
            $time = [math]::Round($sw.Elapsed.TotalSeconds, 3)
            $status = "ok"
          } catch {
            $code = "000"; $time = 0; $status = "fail"
          }
          $line = "{`"time`":`"$timestamp`",`"status`":`"$status`",`"http_code`":`"$code`",`"response_time`":$time}"

          foreach ($i in 1..5) {
            git pull origin main
            Add-Content -Path "metrics-win.jsonl" -Value $line
            git add metrics-win.jsonl
            git commit -m "metrics-win $timestamp" 2>$null
            git push
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Push failed, retry $i..."
            git checkout metrics-win.jsonl
            Start-Sleep -Seconds (Get-Random -Minimum 2 -Maximum 7)
          }
